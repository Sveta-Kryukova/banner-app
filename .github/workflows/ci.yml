# Uses only shell + curl (no actions/checkout or actions/setup-node), for orgs that
# restrict Actions to the same account. If policy allows github.com/actions/*, prefer
# actions/checkout@v4 and actions/setup-node@v4 for speed and PR merge handling.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: "20.18.1"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git clone "${REPO}" .
            git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/merge:pr-head"
            git checkout pr-head
          else
            git clone --branch "${{ github.ref_name }}" --single-branch "${REPO}" .
            git checkout "${{ github.sha }}"
          fi
      - name: Install Node.js
        run: |
          set -euo pipefail
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
          tar -xJf /tmp/node.tar.xz -C /tmp
          echo "/tmp/node-v${NODE_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"
          node --version
          npm --version
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git clone "${REPO}" .
            git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/merge:pr-head"
            git checkout pr-head
          else
            git clone --branch "${{ github.ref_name }}" --single-branch "${REPO}" .
            git checkout "${{ github.sha }}"
          fi
      - name: Install Node.js
        run: |
          set -euo pipefail
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
          tar -xJf /tmp/node.tar.xz -C /tmp
          echo "/tmp/node-v${NODE_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"
          node --version
          npm --version
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
