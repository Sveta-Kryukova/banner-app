# Uses only shell + curl (no actions/checkout or actions/setup-node), for orgs that
# restrict Actions to the same owner. If policy allows github.com/actions/*, prefer
# actions/checkout@v4 and actions/setup-node@v4.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  # Angular CLI 21+ requires Node >=20.19 or >=22.12
  NODE_VERSION: "20.19.0"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git clone "${REPO}" .
            git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/merge:pr-head"
            git checkout pr-head
          else
            git clone --branch "${{ github.ref_name }}" --single-branch "${REPO}" .
            git checkout "${{ github.sha }}"
          fi
      - name: Install Node.js
        run: |
          set -euo pipefail
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
          tar -xJf /tmp/node.tar.xz -C /tmp
          echo "/tmp/node-v${NODE_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"
          node --version
          npm --version
      - name: Install, lint, test, build (backend)
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run test
          npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git clone "${REPO}" .
            git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/merge:pr-head"
            git checkout pr-head
          else
            git clone --branch "${{ github.ref_name }}" --single-branch "${REPO}" .
            git checkout "${{ github.sha }}"
          fi
      - name: Install Node.js
        run: |
          set -euo pipefail
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
          tar -xJf /tmp/node.tar.xz -C /tmp
          echo "/tmp/node-v${NODE_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"
          node --version
          npm --version
      - name: Install, lint, test, build (frontend)
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run test
          npm run build
