<section class="page">
  @if (facade.isEditMode() && facade.isLoadingBanner()) {
    <app-loading-spinner />
  } @else {
    <h1 class="page__title">{{ facade.pageTitle() }}</h1>

    <app-banner-create-form
      [view]="facade.formView()"
      (submitted)="facade.onSubmit()"
      (fileSelected)="facade.onFileSelected($event)"
      (clearImage)="facade.onClearImage()"
      (cancelRequested)="facade.onCancelRequested()"
    />
  }
</section>
