<section class="page">
  @if (facade.isLoading()) {
    <app-loading-spinner />
  } @else if (facade.loadError(); as err) {
    <app-banner-list-error
      [message]="err"
      [retryLabel]="facade.ui.retry"
      (retry)="facade.reload()"
    />
  } @else if (facade.banners().length === 0) {
    <app-banner-list-empty [createPath]="facade.createBannerPath" />
  } @else {
    <header class="page__header">
      <h1 class="page__title">{{ facade.ui.pageTitle }}</h1>
    </header>
    <div
      class="page__infinite"
      infiniteScroll
      [infiniteScrollDistance]="2"
      [infiniteScrollThrottle]="400"
      [scrollWindow]="true"
      [infiniteScrollDisabled]="
        !facade.hasMore() || facade.isLoadingMore()
      "
      (scrolled)="facade.loadMore()"
    >
      <app-banner-list-grid
        [cards]="facade.bannerCards()"
        (deleteBanner)="facade.onDeleteClick($event)"
      />
      @if (facade.isLoadingMore()) {
        <div class="page__load-more" aria-busy="true" aria-live="polite">
          <mat-spinner diameter="36" />
        </div>
      }
    </div>
  }
</section>
