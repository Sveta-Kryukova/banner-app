<mat-toolbar class="app-header" color="primary">
  <div class="app-header__inner">
    <nav class="app-header__nav" [attr.aria-label]="mainNavAriaLabel()">
      @for (item of navItems; track item.path) {
        <app-nav-link
          variant="header"
          [path]="item.path"
          [label]="item.label"
          [icon]="item.icon"
          [routerLinkActiveOptions]="item.routerLinkActiveOptions"
        />
      }
    </nav>

    <app-nav-link variant="title" [path]="homePath" [label]="appTitle()" />

    <div class="app-header__spacer" aria-hidden="true"></div>
  </div>
</mat-toolbar>
